[phases.setup]
nixPkgs = ["php84", "php84Extensions.sqlite3", "php84Extensions.pdo", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "composer_2"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan key:generate --force",
    "php artisan migrate --force",
    "php artisan storage:link"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
